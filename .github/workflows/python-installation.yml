name: Installing Python

on: 
 push:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest,macos-14]
        py-version: [3.10, 3.11, 3.12]
        exclude:
          - os: ubuntu-latest
            py-version: 3.11
          - os: ubuntu-latest
            py-version: 3.10
          - os: macos-14
            py-version: 3.10
            
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.py-version }}