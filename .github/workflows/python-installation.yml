name: Installing Python

on: 
 push:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest]
        py-version: [3.10, 3.11, 3.12]
        exclude:
          - os: [windows-latest]
            py-version: [3.10, 3.11]
            
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.py-version }}